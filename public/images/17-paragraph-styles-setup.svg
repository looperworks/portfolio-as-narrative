<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 415" font-family="'Circular Std','Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      text { fill: #333; }
      .label { font-size: 11px; fill: #777; }
      .label-bold { font-size: 11px; fill: #1A1A1A; font-weight: 600; }
      .title { font-size: 16px; fill: #1A1A1A; font-weight: 600; }
      .white-text { font-size: 11px; fill: #FFF; font-weight: 600; }
      .accent-blue { fill: #3B7DD8; }
      .accent-red { fill: #E85D3A; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="2000" height="2000" fill="white"/>

  <text x="400" y="36" text-anchor="middle" class="title">Paragraph Style Setup</text>
  <line x1="30" y1="48" x2="770" y2="48" stroke="#D0D0D0" stroke-width="0.5"/>

  <!-- Panel A: Paragraph Styles Panel -->
  <rect x="20" y="60" width="200" height="300" fill="white" stroke="#D0D0D0" stroke-width="1.5" rx="5"/>
  <rect x="20" y="60" width="200" height="28" fill="#333" rx="5"/>
  <rect x="20" y="76" width="200" height="12" fill="#333"/>
  <text x="36" y="82" class="white-text">Paragraph Styles</text>

  <!-- Style list -->
  <rect x="35" y="98" width="170" height="28" fill="#F0F4FA" stroke="#3B7DD8" stroke-width="1" rx="3"/>
  <text x="45" y="116" class="label-bold" fill="#3B7DD8">Title</text>
  <text x="160" y="116" class="label" text-anchor="end">24 / 30</text>

  <rect x="35" y="132" width="170" height="28" fill="#FAFAFA" stroke="#D0D0D0" rx="3"/>
  <text x="45" y="150" class="label-bold">Subtitle</text>
  <text x="160" y="150" class="label" text-anchor="end">14 / 18</text>

  <rect x="35" y="166" width="170" height="28" fill="#FAFAFA" stroke="#D0D0D0" rx="3"/>
  <text x="45" y="184" class="label-bold">Body Text</text>
  <text x="160" y="184" class="label" text-anchor="end">10 / 12</text>

  <rect x="35" y="200" width="170" height="28" fill="#FAFAFA" stroke="#D0D0D0" rx="3"/>
  <text x="45" y="218" class="label-bold">Captions</text>
  <text x="160" y="218" class="label" text-anchor="end">8 / 10</text>

  <!-- New style button -->
  <rect x="35" y="240" width="170" height="24" fill="white" stroke="#D0D0D0" stroke-dasharray="4,3" rx="3"/>
  <text x="120" y="256" text-anchor="middle" class="label" fill="#3B7DD8">+ New Paragraph Style</text>

  <!-- Size / Leading label -->
  <text x="35" y="286" class="label" fill="#E85D3A" font-weight="600">Size / Leading (pt)</text>
  <text x="35" y="302" class="label">Window &#x203A; Styles &#x203A;</text>
  <text x="35" y="316" class="label">Paragraph Styles</text>

  <text x="120" y="382" text-anchor="middle" class="label-bold">A</text>
  <text x="120" y="396" text-anchor="middle" class="label">Styles Panel</text>

  <!-- Arrow A to B -->
  <text x="233" y="155" class="label" fill="#3B7DD8" font-weight="600">Define</text>
  <polygon points="245,165 255,170 245,175" fill="#3B7DD8"/>

  <!-- Panel B: Style Options Dialog -->
  <rect x="265" y="60" width="250" height="300" fill="white" stroke="#D0D0D0" stroke-width="1.5" rx="5"/>
  <rect x="265" y="60" width="250" height="28" fill="#333" rx="5"/>
  <rect x="265" y="76" width="250" height="12" fill="#333"/>
  <text x="281" y="82" class="white-text">Paragraph Style Options</text>

  <!-- Basic Character Formats -->
  <rect x="280" y="100" width="220" height="115" fill="none" stroke="#3B7DD8" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <text x="290" y="117" class="label" fill="#3B7DD8" font-weight="600">Basic Character Formats</text>

  <text x="290" y="137" class="label" fill="#E85D3A" font-weight="600">Font Family:</text>
  <rect x="290" y="141" width="195" height="20" fill="#FAFAFA" stroke="#D0D0D0" rx="3"/>
  <text x="300" y="155" class="label-bold">Circular Std</text>

  <text x="290" y="175" class="label" fill="#E85D3A" font-weight="600">Size:</text>
  <rect x="290" y="179" width="80" height="20" fill="#FAFAFA" stroke="#D0D0D0" rx="3"/>
  <text x="300" y="193" class="label-bold">10pt</text>
  <text x="385" y="175" class="label" fill="#E85D3A" font-weight="600">Leading:</text>
  <rect x="385" y="179" width="80" height="20" fill="#FAFAFA" stroke="#D0D0D0" rx="3"/>
  <text x="395" y="193" class="label-bold">12pt</text>

  <!-- Indents and Spacing — CRITICAL -->
  <rect x="280" y="225" width="220" height="75" fill="#FFF8F0" stroke="#E85D3A" stroke-width="1.5" rx="3"/>
  <text x="290" y="242" class="label" fill="#E85D3A" font-weight="600">Indents and Spacing</text>

  <text x="290" y="262" class="label" fill="#E85D3A" font-weight="600">Align to Grid:</text>
  <rect x="290" y="266" width="195" height="22" fill="#FAFAFA" stroke="#E85D3A" stroke-width="1" rx="3"/>
  <text x="300" y="282" class="label-bold" fill="#E85D3A">All Lines</text>
  <text x="400" y="282" class="label" fill="#E85D3A" font-weight="600">&#x2190; CRITICAL</text>

  <!-- Buttons -->
  <rect x="367" y="310" width="55" height="24" fill="#FAFAFA" stroke="#D0D0D0" rx="4"/>
  <text x="394" y="326" text-anchor="middle" class="label-bold">Cancel</text>
  <rect x="430" y="310" width="55" height="24" fill="#3B7DD8" rx="4"/>
  <text x="457" y="326" text-anchor="middle" class="white-text">OK</text>

  <text x="390" y="382" text-anchor="middle" class="label-bold">B</text>
  <text x="390" y="396" text-anchor="middle" class="label">Style Options</text>

  <!-- Arrow B to C -->
  <text x="528" y="155" class="label" fill="#3B7DD8" font-weight="600">Result</text>
  <polygon points="540,165 550,170 540,175" fill="#3B7DD8"/>

  <!-- Panel C: Live Preview -->
  <rect x="560" y="60" width="220" height="300" fill="white" stroke="#333" stroke-width="1" rx="3"/>

  <!-- Baseline grid lines (faint red) -->
  <g opacity="0.15">
    <line x1="575" y1="80" x2="765" y2="80" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="92" x2="765" y2="92" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="104" x2="765" y2="104" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="116" x2="765" y2="116" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="128" x2="765" y2="128" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="140" x2="765" y2="140" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="152" x2="765" y2="152" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="164" x2="765" y2="164" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="176" x2="765" y2="176" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="188" x2="765" y2="188" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="200" x2="765" y2="200" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="212" x2="765" y2="212" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="224" x2="765" y2="224" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="236" x2="765" y2="236" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="248" x2="765" y2="248" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="260" x2="765" y2="260" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="272" x2="765" y2="272" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="284" x2="765" y2="284" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="296" x2="765" y2="296" stroke="#E85D3A" stroke-width="0.5"/>
    <line x1="575" y1="308" x2="765" y2="308" stroke="#E85D3A" stroke-width="0.5"/>
  </g>

  <!-- Column divider -->
  <line x1="670" y1="75" x2="670" y2="340" stroke="#D0D0D0" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Title style preview -->
  <rect x="580" y="80" width="120" height="14" fill="#333" rx="1"/>
  <text x="585" y="90" style="font-size:9px;fill:#FFF;font-weight:600;">Project Name</text>
  <text x="710" y="90" class="label" fill="#3B7DD8" font-weight="600" text-anchor="start">Title</text>
  <text x="710" y="102" class="label">24/30</text>

  <!-- Subtitle style preview -->
  <rect x="580" y="104" width="80" height="10" fill="#777" rx="1"/>
  <text x="585" y="112" style="font-size:7px;fill:#FFF;">Site Analysis</text>
  <text x="710" y="112" class="label" fill="#3B7DD8" font-weight="600" text-anchor="start">Subtitle</text>
  <text x="710" y="124" class="label">14/18</text>

  <!-- Body text preview — aligned to grid -->
  <rect x="580" y="136" width="82" height="4" fill="#999" rx="1"/>
  <rect x="580" y="148" width="82" height="4" fill="#999" rx="1"/>
  <rect x="580" y="160" width="82" height="4" fill="#999" rx="1"/>
  <rect x="580" y="172" width="60" height="4" fill="#999" rx="1"/>
  <!-- Column 2 body — aligned -->
  <rect x="676" y="136" width="82" height="4" fill="#999" rx="1"/>
  <rect x="676" y="148" width="82" height="4" fill="#999" rx="1"/>
  <rect x="676" y="160" width="82" height="4" fill="#999" rx="1"/>
  <rect x="676" y="172" width="55" height="4" fill="#999" rx="1"/>

  <!-- Alignment indicators -->
  <line x1="574" y1="140" x2="578" y2="140" stroke="#3B7DD8" stroke-width="1.5"/>
  <line x1="574" y1="152" x2="578" y2="152" stroke="#3B7DD8" stroke-width="1.5"/>
  <line x1="574" y1="164" x2="578" y2="164" stroke="#3B7DD8" stroke-width="1.5"/>
  <line x1="574" y1="176" x2="578" y2="176" stroke="#3B7DD8" stroke-width="1.5"/>

  <!-- Body label -->
  <text x="625" y="196" text-anchor="middle" class="label" fill="#3B7DD8" font-weight="600">Body Text 10/12</text>
  <text x="625" y="208" text-anchor="middle" class="label" fill="#3B7DD8">&#x2191; aligned to grid</text>

  <!-- Caption preview -->
  <rect x="580" y="224" width="82" height="40" fill="#E8E8E8" stroke="#D0D0D0" rx="2"/>
  <line x1="580" y1="224" x2="662" y2="264" stroke="#D0D0D0" stroke-width="0.5"/>
  <line x1="662" y1="224" x2="580" y2="264" stroke="#D0D0D0" stroke-width="0.5"/>
  <rect x="580" y="270" width="82" height="3" fill="#BBB" rx="1"/>
  <rect x="580" y="277" width="55" height="3" fill="#BBB" rx="1"/>
  <text x="710" y="270" class="label" fill="#3B7DD8" font-weight="600" text-anchor="start">Caption</text>
  <text x="710" y="282" class="label">8/10 italic</text>

  <!-- Cross-column alignment callout -->
  <rect x="580" y="300" width="175" height="38" fill="#F0F4FA" stroke="#3B7DD8" stroke-width="0.75" rx="3"/>
  <text x="590" y="316" class="label" fill="#3B7DD8" font-weight="600">&#x2713; Lines align across columns</text>
  <text x="590" y="330" class="label">Baseline grid locks every line</text>

  <text x="670" y="382" text-anchor="middle" class="label-bold">C</text>
  <text x="670" y="396" text-anchor="middle" class="label">Live Preview</text>

</svg>