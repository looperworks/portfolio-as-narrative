<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 415" font-family="'Circular Std','Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      text { fill: #333; }
      .label { font-size: 11px; fill: #777; }
      .label-bold { font-size: 11px; fill: #1A1A1A; font-weight: 600; }
      .title { font-size: 16px; fill: #1A1A1A; font-weight: 600; }
      .subtitle { font-size: 11px; fill: #999; letter-spacing: 2px; text-transform: uppercase; }
      .white-text { font-size: 11px; fill: #FFF; font-weight: 600; }
      .accent-blue { fill: #3B7DD8; }
      .accent-red { fill: #E85D3A; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="2000" height="2000" fill="white"/>

  <text x="400" y="36" text-anchor="middle" class="title">Layer Setup &amp; Non-Printing Guides</text>
  <line x1="30" y1="48" x2="770" y2="48" stroke="#D0D0D0" stroke-width="0.5"/>

  <!-- Panel A: Layers Panel -->
  <rect x="20" y="60" width="220" height="300" fill="white" stroke="#D0D0D0" stroke-width="1.5" rx="5"/>
  <rect x="20" y="60" width="220" height="28" fill="#333" rx="5"/>
  <rect x="20" y="76" width="220" height="12" fill="#333"/>
  <text x="36" y="82" class="white-text">Layers Panel</text>

  <!-- Layer rows -->
  <!-- 01_Text -->
  <rect x="35" y="100" width="190" height="40" fill="#FAFAFA" stroke="#D0D0D0" rx="3"/>
  <circle cx="50" cy="120" r="6" fill="#3B7DD8"/>
  <text x="65" y="116" class="label-bold">01_Text</text>
  <text x="65" y="130" class="label">Titles, descriptions, page #s</text>
  <rect x="195" y="108" width="20" height="14" fill="none" stroke="#D0D0D0" rx="2"/>
  <text x="205" y="119" text-anchor="middle" style="font-size:8px;fill:#3B7DD8;">&#x1F441;</text>

  <!-- 02_Images -->
  <rect x="35" y="148" width="190" height="40" fill="#FAFAFA" stroke="#D0D0D0" rx="3"/>
  <circle cx="50" cy="168" r="6" fill="#E85D3A"/>
  <text x="65" y="164" class="label-bold">02_Images</text>
  <text x="65" y="178" class="label">Drawings, renders, photos</text>
  <rect x="195" y="156" width="20" height="14" fill="none" stroke="#D0D0D0" rx="2"/>
  <text x="205" y="167" text-anchor="middle" style="font-size:8px;fill:#E85D3A;">&#x1F441;</text>

  <!-- 03_Guides -->
  <rect x="35" y="196" width="190" height="40" fill="#F0F4FA" stroke="#3B7DD8" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <circle cx="50" cy="216" r="6" fill="#999"/>
  <text x="65" y="212" class="label-bold">03_Guides</text>
  <text x="65" y="226" class="label">Non-printing guides, placeholders</text>
  <!-- Lock icon -->
  <rect x="195" y="204" width="20" height="14" fill="#333" rx="2"/>
  <text x="205" y="215" text-anchor="middle" style="font-size:8px;fill:#FFF;">&#x1F512;</text>

  <!-- Stacking order arrow -->
  <text x="35" y="260" class="label" fill="#E85D3A" font-weight="600">Stacking Order:</text>
  <line x1="35" y1="268" x2="35" y2="310" stroke="#BBB" stroke-width="0.75"/>
  <text x="45" y="280" class="label">Top (visible first)</text>
  <polygon points="32,310 38,310 35,316" fill="#BBB"/>
  <text x="45" y="314" class="label">Bottom (behind all)</text>

  <text x="130" y="382" text-anchor="middle" class="label-bold">A</text>
  <text x="130" y="396" text-anchor="middle" class="label">Layers Panel</text>

  <!-- Arrow A to B -->
  <text x="256" y="155" class="label" fill="#3B7DD8" font-weight="600">Configure</text>
  <polygon points="272,165 282,170 272,175" fill="#3B7DD8"/>

  <!-- Panel B: Layer Options Dialog -->
  <rect x="295" y="60" width="230" height="300" fill="white" stroke="#D0D0D0" stroke-width="1.5" rx="5"/>
  <rect x="295" y="60" width="230" height="28" fill="#333" rx="5"/>
  <rect x="295" y="76" width="230" height="12" fill="#333"/>
  <text x="311" y="82" class="white-text">Layer Options &#x2192; 03_Guides</text>

  <rect x="310" y="105" width="200" height="170" fill="none" stroke="#3B7DD8" stroke-width="1" stroke-dasharray="4,3" rx="3"/>

  <text x="320" y="125" class="label" fill="#E85D3A" font-weight="600">Name:</text>
  <rect x="320" y="130" width="175" height="22" fill="#FAFAFA" stroke="#D0D0D0" rx="3"/>
  <text x="330" y="146" class="label-bold">03_Guides</text>

  <text x="320" y="175" class="label" fill="#E85D3A" font-weight="600">Color:</text>
  <rect x="320" y="180" width="175" height="22" fill="#FAFAFA" stroke="#D0D0D0" rx="3"/>
  <text x="330" y="196" class="label-bold">Light Blue</text>

  <!-- Checkboxes -->
  <rect x="320" y="215" width="14" height="14" fill="#FAFAFA" stroke="#3B7DD8" rx="2"/>
  <text x="322" y="226" style="font-size:10px;fill:#3B7DD8;font-weight:700;">&#x2713;</text>
  <text x="340" y="226" class="label-bold">Lock Layer</text>

  <rect x="320" y="240" width="14" height="14" fill="#FAFAFA" stroke="#E85D3A" rx="2"/>
  <text x="340" y="251" class="label-bold" fill="#E85D3A">Print Layer</text>
  <line x1="338" y1="248" x2="414" y2="248" stroke="#E85D3A" stroke-width="1.5"/>
  <text x="420" y="251" class="label" fill="#E85D3A" font-weight="600">&#x2190; UNCHECK</text>

  <!-- Buttons -->
  <rect x="377" y="310" width="55" height="24" fill="#FAFAFA" stroke="#D0D0D0" rx="4"/>
  <text x="404" y="326" text-anchor="middle" class="label-bold">Cancel</text>
  <rect x="440" y="310" width="55" height="24" fill="#3B7DD8" rx="4"/>
  <text x="467" y="326" text-anchor="middle" class="white-text">OK</text>

  <text x="410" y="382" text-anchor="middle" class="label-bold">B</text>
  <text x="410" y="396" text-anchor="middle" class="label">Layer Options</text>

  <!-- Arrow B to C -->
  <text x="540" y="155" class="label" fill="#3B7DD8" font-weight="600">Result</text>
  <polygon points="552,165 562,170 552,175" fill="#3B7DD8"/>

  <!-- Panel C: Result / Composite View -->
  <rect x="575" y="60" width="205" height="300" fill="white" stroke="#333" stroke-width="1" rx="3"/>

  <!-- 01_Text content (top) -->
  <rect x="590" y="80" width="175" height="65" fill="#FAFAFA" stroke="#D0D0D0" rx="2"/>
  <rect x="600" y="90" width="80" height="8" fill="#333" rx="1"/>
  <rect x="600" y="103" width="60" height="5" fill="#BBB" rx="1"/>
  <rect x="600" y="113" width="155" height="4" fill="#D0D0D0" rx="1"/>
  <rect x="600" y="121" width="155" height="4" fill="#D0D0D0" rx="1"/>
  <rect x="600" y="129" width="100" height="4" fill="#D0D0D0" rx="1"/>
  <text x="770" y="92" class="label" fill="#3B7DD8" font-weight="600" text-anchor="end">01</text>

  <!-- 02_Images content (middle) -->
  <rect x="590" y="155" width="175" height="65" fill="#FAFAFA" stroke="#D0D0D0" rx="2"/>
  <rect x="600" y="165" width="70" height="45" fill="#E8E8E8" stroke="#D0D0D0" rx="2"/>
  <line x1="600" y1="165" x2="670" y2="210" stroke="#D0D0D0" stroke-width="0.5"/>
  <line x1="670" y1="165" x2="600" y2="210" stroke="#D0D0D0" stroke-width="0.5"/>
  <rect x="680" y="165" width="70" height="45" fill="#E8E8E8" stroke="#D0D0D0" rx="2"/>
  <line x1="680" y1="165" x2="750" y2="210" stroke="#D0D0D0" stroke-width="0.5"/>
  <line x1="750" y1="165" x2="680" y2="210" stroke="#D0D0D0" stroke-width="0.5"/>
  <text x="770" y="167" class="label" fill="#E85D3A" font-weight="600" text-anchor="end">02</text>

  <!-- 03_Guides content (bottom - dashed, faded) -->
  <rect x="590" y="230" width="175" height="65" fill="none" stroke="#BBB" stroke-width="1" stroke-dasharray="4,3" rx="2"/>
  <line x1="590" y1="250" x2="765" y2="250" stroke="#BBB" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="590" y1="270" x2="765" y2="270" stroke="#BBB" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="630" y1="230" x2="630" y2="295" stroke="#BBB" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="680" y1="230" x2="680" y2="295" stroke="#BBB" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="730" y1="230" x2="730" y2="295" stroke="#BBB" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="678" y="262" text-anchor="middle" class="label" fill="#999" font-style="italic">non-printing</text>
  <text x="770" y="242" class="label" fill="#999" font-weight="600" text-anchor="end">03</text>

  <!-- Result labels -->
  <text x="678" y="318" text-anchor="middle" class="label" font-style="italic">text above images</text>
  <text x="678" y="332" text-anchor="middle" class="label" font-style="italic">guides hidden in export</text>

  <text x="678" y="382" text-anchor="middle" class="label-bold">C</text>
  <text x="678" y="396" text-anchor="middle" class="label">Composite Result</text>

</svg>